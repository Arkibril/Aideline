<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact - Aideline</title>
    
    <!-- Polices et Icônes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        :root { 
            --primary: #640C31;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rubik', sans-serif; -webkit-tap-highlight-color: transparent;}
        
        body { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: var(--white);
            display: flex; flex-direction: column;
        }

        /* HEADER SUPERIEUR */
        .top-header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px 20px 16px;
            background: var(--white);
            z-index: 10;
        }
        .back-btn {
            position: absolute;
            left: 16px;
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .back-btn .material-symbols-outlined { font-size: 28px; color: #000; font-weight: 500;}
        .top-header h1 {
            font-size: 20px;
            font-weight: 500;
            color: #000;
        }

        /* CONTENU SCROLLABLE CENTRALE */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 100px 20px; /* Espace pour la bottom nav */
        }

        /* TITRES DE SECTION */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #000;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* CARTES ENCADRÉES ROUGES */
        .contact-card {
            background: var(--white);
            border: 1px solid var(--primary);
            border-radius: 12px;
            margin-bottom: 40px;
            overflow: hidden; /* Pour que les lignes de séparation ne débordent pas */
        }

        /* LIGNES DE CONTACT */
        .contact-row {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.15);
            background: var(--white);
            cursor: pointer;
        }
        .contact-row:last-child {
            border-bottom: none;
        }
        .contact-row:active {
            background: #F8F8F8;
        }

        /* AVATARS */
        .avatar {
            width: 54px; height: 54px;
            border-radius: 50%;
            object-fit: cover;
            background: #E0E0E0;
            margin-right: 12px;
        }

        /* INFOS (Centreés) */
        .contact-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centre le texte exact comme sur la maquette */
            justify-content: center;
        }
        .contact-name {
            font-size: 16px;
            font-weight: 700;
            color: #000;
        }
        .contact-sub {
            font-size: 12px;
            font-weight: 500;
            color: #555;
            margin-top: 2px;
        }

        /* BOUTON D'APPEL GRAS */
        .call-btn {
            background: none; border: none;
            display: flex; align-items: center; justify-content: center;
            margin-left: 12px;
        }
        .call-btn .material-symbols-outlined {
            font-size: 30px;
            color: #111;
            font-variation-settings: 'FILL' 1, 'wght' 600; /* Icône Telephone massive Fill */
        }

        /* NAVBAR BAS */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 70px;
            background-color: var(--primary);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0,0,0,0.1);
            z-index: 2000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--white); cursor: pointer; text-decoration: none;
        }
        .nav-item .material-symbols-outlined { font-size: 28px; margin-bottom: 4px; }
        .nav-item .nav-text { font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <!-- ZONE HAUT : HEADER -->
    <div class="top-header">
        <button class="back-btn" onclick="window.history.back()">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1>Contact</h1>
    </div>

    <!-- ZONE MILIEU : LISTE DE CONTACTS -->
    <div class="content-scroll">
        
        <!-- SECTION FAMILLE -->
        <h2 class="section-title">FAMILLE</h2>
        <div class="contact-card">
            <!-- Photos de profils générées pour la démo -->
            <div class="contact-row" onclick="actionCall('Jérôme')">
                <img src="https://i.pravatar.cc/150?img=11" alt="Jérôme" class="avatar">
                <div class="contact-info">
                    <div class="contact-name">Jérôme</div>
                </div>
                <button class="call-btn"><span class="material-symbols-outlined">call</span></button>
            </div>
            
            <div class="contact-row" onclick="actionCall('Marianne')">
                <img src="https://i.pravatar.cc/150?img=5" alt="Marianne" class="avatar">
                <div class="contact-info">
                    <div class="contact-name">Marianne</div>
                </div>
                <button class="call-btn"><span class="material-symbols-outlined">call</span></button>
            </div>

            <div class="contact-row" onclick="actionCall('Daphnée')">
                <img src="https://i.pravatar.cc/150?img=1" alt="Daphnée" class="avatar">
                <div class="contact-info">
                    <div class="contact-name">Daphnée</div>
                </div>
                <button class="call-btn"><span class="material-symbols-outlined">call</span></button>
            </div>
        </div>

        <!-- SECTION DOCTEUR -->
        <h2 class="section-title">DOCTEUR</h2>
        <div class="contact-card">
            <div class="contact-row" onclick="actionCall('Dr Konate')">
                <img src="doc_konate.png" alt="Dr Konate" class="avatar">
                <div class="contact-info">
                    <div class="contact-name">Dr Konate</div>
                    <div class="contact-sub">Dr Généraliste</div>
                </div>
                <button class="call-btn"><span class="material-symbols-outlined">call</span></button>
            </div>
            
            <div class="contact-row" onclick="actionCall('Dr Issaoui')">
                <img src="doc_issaoui.png" alt="Dr Issaoui" class="avatar">
                <div class="contact-info">
                    <div class="contact-name">Dr Issaoui</div>
                    <div class="contact-sub">Dr Généraliste</div>
                </div>
                <button class="call-btn"><span class="material-symbols-outlined">call</span></button>
            </div>
        </div>

        <!-- SECTION AIDELINE -->
        <h2 class="section-title">AIDELINE</h2>
        <div class="contact-card" style="margin-bottom:0;">
            <div class="contact-row" onclick="actionCall('Assistance Aideline')">
                <img src="support_agent.png" alt="Assistance" class="avatar">
                <div class="contact-info">
                    <div class="contact-name">Service d'assistance</div>
                    <div class="contact-sub">Support d'urgence en direct</div>
                </div>
                <button class="call-btn"><span class="material-symbols-outlined">call</span></button>
            </div>
        </div>
        
    </div>

    <!-- ZONE BAS : NAVBAR -->
            <!-- BOTTOM NAVBAR -->
    <style>.bottom-nav a { text-decoration: none !important; }</style>
    <div class="bottom-nav">
        <a href="map.html" class="nav-item" id="nav-carte"><span class="material-symbols-outlined">location_on</span><span class="nav-text">Carte</span></a>
        <a href="agenda.html" class="nav-item" id="nav-agenda">
            <span class="material-symbols-outlined">calendar_today</span>
            <span class="nav-text">Agenda</span>
        </a>
        <a href="contact.html" class="nav-item" id="nav-appel">
            <span class="material-symbols-outlined">call</span>
            <span class="nav-text">Appel</span>
        </a>
        <a href="parametre.html" class="nav-item" id="nav-param">
            <span class="material-symbols-outlined">settings</span>
            <span class="nav-text">Paramètre</span>
        </a>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const p = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(p.includes('agenda') || p.includes('event_')) { 
                if(document.getElementById('nav-agenda')) document.getElementById('nav-agenda').classList.add('active'); 
            }
            else if(p.includes('contact')) { 
                if(document.getElementById('nav-appel')) document.getElementById('nav-appel').classList.add('active'); 
            }
            else if(p.includes('param')) { 
                if(document.getElementById('nav-param')) document.getElementById('nav-param').classList.add('active'); 
            }
            else { 
                if(document.getElementById('nav-carte')) document.getElementById('nav-carte').classList.add('active'); 
            }
        });
    </script>
</body>
</html>
