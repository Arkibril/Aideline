<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajouter Adresse - Aideline</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        :root { 
            --primary: #9C1132;
            --white: #FFFFFF;
            --input-bg: #F5F5F5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rubik', sans-serif; -webkit-tap-highlight-color: transparent;}
        
        body { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background: var(--white); display: flex; flex-direction: column;
        }

        /* HEADER */
        .top-header {
            position: relative; display: flex; align-items: center; justify-content: center;
            padding: 24px 16px 20px 16px; background: var(--white); z-index: 10;
        }
        .back-btn {
            position: absolute; left: 16px; background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .back-btn .material-symbols-outlined { font-size: 28px; color: #000; font-weight: 500;}
        .top-header h1 { font-size: 20px; font-weight: 500; color: #000; }

        /* CONTENT */
        .content-scroll {
            flex: 1; overflow-y: auto; padding: 16px 24px 100px 24px;
        }

        /* FORM GROUPS */
        .form-group { margin-bottom: 24px; }
        
        .form-label {
            display: block; font-size: 15px; font-weight: 700; color: #333; margin-bottom: 12px;
        }
        
        .form-input {
            width: 100%;
            background-color: var(--input-bg);
            border: none;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #111;
            outline: none;
        }
        
        .form-input::placeholder {
            color: #999; font-weight: 500;
        }

        /* BUTTON */
        .btn-save {
            width: 100%;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            margin-top: 12px;
        }

        /* NAVBAR BAS */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background-color: var(--primary); display: flex; justify-content: space-around; align-items: center;
        }
        .bottom-nav a { text-decoration: none !important; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--white); cursor: pointer; opacity: 0.7;
        }
        .nav-item.active { opacity: 1; }
        .nav-item .material-symbols-outlined { font-size: 28px; margin-bottom: 4px; }
        .nav-item .nav-text { font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="top-header">
        <button class="back-btn" onclick="window.history.back()">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1>Adresses favorites</h1>
    </div>

    <!-- CONTENT -->
    <div class="content-scroll">
        
        <div class="form-group">
            <label class="form-label">Nom de l'adresse</label>
            <input type="text" class="form-input" placeholder="ex: Maison, Travail">
        </div>

        <div class="form-group">
            <label class="form-label">Adresse de la rue</label>
            <input type="text" class="form-input" placeholder="ex: 123 rue Principale">
        </div>

        <div class="form-group">
            <label class="form-label">Ville</label>
            <input type="text" class="form-input" placeholder="ex: Paris">
        </div>

        <div class="form-group">
            <label class="form-label">Code postal</label>
            <input type="text" class="form-input" placeholder="ex: 75001">
        </div>

        <button class="btn-save" onclick="window.location.href='adresses_favorites.html'">Enregistrer l'adresse</button>

    </div>

    <!-- BOTTOM NAVBAR -->
    <style>.bottom-nav a { text-decoration: none !important; }</style>
    <div class="bottom-nav">
        <a href="map.html" class="nav-item" id="nav-carte"><span class="material-symbols-outlined">location_on</span><span class="nav-text">Carte</span></a>
        <a href="agenda.html" class="nav-item" id="nav-agenda">
            <span class="material-symbols-outlined">calendar_today</span>
            <span class="nav-text">Agenda</span>
        </a>
        <a href="contact.html" class="nav-item" id="nav-appel">
            <span class="material-symbols-outlined">call</span>
            <span class="nav-text">Appel</span>
        </a>
        <a href="parametre.html" class="nav-item" id="nav-param">
            <span class="material-symbols-outlined">settings</span>
            <span class="nav-text">Paramètre</span>
        </a>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const p = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(p.includes('agenda') || p.includes('event_')) { 
                if(document.getElementById('nav-agenda')) document.getElementById('nav-agenda').classList.add('active'); 
            }
            else if(p.includes('contact')) { 
                if(document.getElementById('nav-appel')) document.getElementById('nav-appel').classList.add('active'); 
            }
            else if(p.includes('param')) { 
                if(document.getElementById('nav-param')) document.getElementById('nav-param').classList.add('active'); 
            }
            else { 
                if(document.getElementById('nav-carte')) document.getElementById('nav-carte').classList.add('active'); 
            }
        });
    </script>
</body>
</html>
