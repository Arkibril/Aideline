<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Détail RDV - Aideline</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        :root { 
            --primary: #9C1132;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rubik', sans-serif; -webkit-tap-highlight-color: transparent;}
        
        body { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background: var(--white); display: flex; flex-direction: column;
        }

        /* HEADER */
        .top-header {
            position: relative; display: flex; align-items: center; justify-content: center;
            padding: 24px 16px 20px 16px; background: var(--white); z-index: 10;
            margin-bottom: 12px;
        }
        .back-btn {
            position: absolute; left: 16px; background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .back-btn .material-symbols-outlined { font-size: 28px; color: #000; font-weight: 500;}
        .top-header h1 { font-size: 18px; font-weight: 600; color: #333; }

        /* CONTENT */
        .content-scroll {
            flex: 1; overflow-y: auto; padding: 0 16px 100px 16px;
        }

        /* CARDS */
        .info-card {
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .info-title { font-size: 16px; font-weight: 600; color: #555; }
        .info-time { font-size: 16px; font-weight: 800; color: #111; }

        .items-card {
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 32px;
            display: flex; align-items: flex-start;
        }
        .items-card .material-symbols-outlined.doc-icon { font-size: 24px; color: #999; margin-right: 12px; }
        .items-card .edit-icon { font-size: 24px; color: #111; margin-left: auto; cursor: pointer;}
        
        .items-list-container { flex: 1; }
        .items-title { font-size: 16px; font-weight: 800; color: #111; margin-bottom: 4px; }
        .items-ul { list-style-type: disc; margin-left: 20px; color: #111; font-weight: 700; font-size: 15px; }

        /* ACTIONS */
        .btn-action {
            width: 100%; background: var(--primary); color: white;
            border: none; border-radius: 20px; padding: 18px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-bottom: 16px;
        }
        .btn-action .material-symbols-outlined { font-size: 24px; }

        /* NAVBAR BAS */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background-color: var(--primary); display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--white); cursor: pointer; text-decoration: none; opacity: 0.7;
        }
        .nav-item.active { opacity: 1; }
        .nav-item .material-symbols-outlined { font-size: 28px; margin-bottom: 4px; }
        .nav-item .nav-text { font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="top-header">
        <button class="back-btn" onclick="window.history.back()">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1>RDV Docteur Konaté</h1>
    </div>

    <!-- CONTENT -->
    <div class="content-scroll">
        
        <div class="info-card">
            <div class="info-title">Rendez-vous médical</div>
            <div class="info-time">10h - 12h</div>
        </div>

        <div class="items-card" id="items-card">
            <span class="material-symbols-outlined doc-icon">description</span>
            <div class="items-list-container" id="items-content">
                <div class="items-title">À prendre :</div>
                <ul class="items-ul" id="items-ul">
                    <li>Carte vitale</li>
                    <li>Carnet de santé</li>
                </ul>
                <textarea id="items-textarea" style="display:none; width:100%; min-height:60px; font-family:'Rubik', sans-serif; font-size: 15px; font-weight:700; color: #111; border:1px solid rgba(0,0,0,0.2); border-radius:6px; padding:8px; margin-top:4px; outline:none; resize:vertical;"></textarea>
            </div>
            <span class="material-symbols-outlined edit-icon" id="edit-btn" onclick="toggleEdit()">edit</span>
        </div>

        <button class="btn-action">
            <span class="material-symbols-outlined">notifications</span>
            Mettre une alarme
        </button>

        <button class="btn-action">
            <span class="material-symbols-outlined">call</span>
            Contacter
        </button>

        <button class="btn-action" style="margin-top:20px;">
            Annuler
        </button>

    </div>

            <!-- BOTTOM NAVBAR -->
    <style>.bottom-nav a { text-decoration: none !important; }</style>
    <div class="bottom-nav">
        <a href="map.html" class="nav-item" id="nav-carte"><span class="material-symbols-outlined">location_on</span><span class="nav-text">Carte</span></a>
        <a href="agenda.html" class="nav-item" id="nav-agenda">
            <span class="material-symbols-outlined">calendar_today</span>
            <span class="nav-text">Agenda</span>
        </a>
        <a href="contact.html" class="nav-item" id="nav-appel">
            <span class="material-symbols-outlined">call</span>
            <span class="nav-text">Appel</span>
        </a>
        <a href="parametre.html" class="nav-item" id="nav-param">
            <span class="material-symbols-outlined">settings</span>
            <span class="nav-text">Paramètre</span>
        </a>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const p = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(p.includes('agenda') || p.includes('event_')) { 
                if(document.getElementById('nav-agenda')) document.getElementById('nav-agenda').classList.add('active'); 
            }
            else if(p.includes('contact')) { 
                if(document.getElementById('nav-appel')) document.getElementById('nav-appel').classList.add('active'); 
            }
            else if(p.includes('param')) { 
                if(document.getElementById('nav-param')) document.getElementById('nav-param').classList.add('active'); 
            }
            else { 
                if(document.getElementById('nav-carte')) document.getElementById('nav-carte').classList.add('active'); 
            }
        });

        let isEditing = false;
        function toggleEdit() {
            const ul = document.getElementById('items-ul');
            const textarea = document.getElementById('items-textarea');
            const btn = document.getElementById('edit-btn');
            
            if(!isEditing) {
                // Passage en mode édition
                let lines = [];
                document.querySelectorAll('#items-ul li').forEach(li => lines.push(li.innerText));
                textarea.value = lines.join('\n');
                ul.style.display = 'none';
                textarea.style.display = 'block';
                btn.innerText = 'check_circle';
                btn.style.color = 'var(--primary)';
                textarea.focus();
            } else {
                // Sauvegarde
                let lines = textarea.value.trim().split('\n').filter(l => l.trim() !== '');
                ul.innerHTML = '';
                if(lines.length === 0) {
                    let li = document.createElement('li');
                    li.innerText = 'Aucun document';
                    li.style.fontStyle = 'italic';
                    li.style.color = '#777';
                    ul.appendChild(li);
                } else {
                    lines.forEach(l => {
                        let li = document.createElement('li');
                        li.innerText = l.trim();
                        ul.appendChild(li);
                    });
                }
                textarea.style.display = 'none';
                ul.style.display = 'block';
                btn.innerText = 'edit';
                btn.style.color = '#111';
            }
            isEditing = !isEditing;
        }
    </script>
</body>
</html>
