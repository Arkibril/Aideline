<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajouter un évènement - Aideline</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        :root { 
            --primary: #640C31;
            --white: #FFFFFF;
            --input-bg: #F0F0F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rubik', sans-serif; -webkit-tap-highlight-color: transparent;}
        
        body { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background: var(--white); display: flex; flex-direction: column;
        }

        /* HEADER */
        .top-header {
            position: relative; display: flex; align-items: center; justify-content: center;
            padding: 24px 16px 20px 16px; background: var(--white); z-index: 10;
            margin-bottom: 24px;
        }
        .back-btn {
            position: absolute; left: 16px; background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .back-btn .material-symbols-outlined { font-size: 28px; color: #000; font-weight: 500;}
        .top-header h1 { font-size: 20px; font-weight: 500; color: #000; }

        /* CONTENT */
        .content-scroll {
            flex: 1; overflow-y: auto; padding: 0 16px 100px 16px;
        }

        /* FORM INPUTS */
        .input-box {
            background: var(--input-bg);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
            width: 100%;
            display: flex; align-items: center;
        }
        .input-box input, .input-box textarea {
            background: transparent; border: none; outline: none;
            width: 100%; font-size: 15px; font-weight: 700; color: #555;
            font-family: 'Rubik', sans-serif;
        }
        .input-box input::placeholder, .input-box textarea::placeholder {
            color: #777;
        }
        .input-box .material-symbols-outlined {
            color: #555; font-size: 20px; margin-right: 12px;
        }

        /* CATEGORIES */
        .categories-container {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
        }
        .category-pill {
            padding: 8px 16px; border-radius: 20px; background: #eee;
            font-size: 14px; font-weight: 600; color: #555; cursor: pointer;
            border: 2px solid transparent;
        }
        .category-pill.active {
            background: #FFF5F7; border: 2px solid var(--primary); color: var(--primary);
        }
        .category-pill.add-custom {
            background: transparent; border: 2px dashed #ccc; color: #777;
        }

        /* DATES ROW */
        .dates-row {
            display: flex; gap: 16px; margin-bottom: 16px;
        }
        .dates-row .input-box { margin-bottom: 0; }

        /* BTN SAVE */
        .btn-save {
            width: 100%; background: var(--primary); color: white;
            border: none; border-radius: 20px; padding: 18px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            text-align: center; margin-top: 16px;
        }

        /* NAVBAR BAS */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background-color: var(--primary); display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--white); cursor: pointer; text-decoration: none; opacity: 0.7;
        }
        .nav-item.active { opacity: 1; }
        .nav-item .material-symbols-outlined { font-size: 28px; margin-bottom: 4px; }
        .nav-item .nav-text { font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="top-header">
        <button class="back-btn" onclick="window.history.back()">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1>Ajouter un évènement</h1>
    </div>

    <!-- CONTENT -->
    <div class="content-scroll">
        
        <div class="input-box">
            <input type="text" placeholder="Titre de l'événement">
        </div>

        <div style="position:relative;">
            <div class="input-box">
                <span class="material-symbols-outlined">near_me</span>
                <input type="text" id="emplacement-input" placeholder="Emplacement" autocomplete="off" oninput="searchAddress(this.value)">
            </div>
            <div id="suggestions-box" style="position: absolute; top: calc(100% - 10px); left: 0; width: 100%; z-index: 10; display: none; background: white; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-height: 200px; overflow-y: auto; margin-bottom:16px;"></div>
        </div>

        <div style="font-size: 16px; font-weight: 700; color: #000; margin-bottom: 12px; margin-top: 12px;">Étiquette de l'évènement</div>
        <div class="categories-container" id="categories-container">
            <div class="category-pill active" onclick="selectCategory(this)">Médecin</div>
            <div class="category-pill" onclick="selectCategory(this)">RDV</div>
            <div class="category-pill" onclick="selectCategory(this)">Activité</div>
            <div class="category-pill add-custom" id="btn-add-custom" onclick="openCustomCategoryBox()">+ Nouvelle</div>
        </div>
        
        <div id="custom-cat-box" style="display:none; margin-bottom:24px;">
            <div class="input-box" style="margin-bottom: 8px;">
                <input type="text" id="custom-cat-input" placeholder="Nom de l'étiquette (ex: Sport)">
            </div>
            <button class="btn-save" style="margin-top:0; padding:10px; font-size:14px; width: auto; padding: 10px 24px;" onclick="addCustomCategory()">Ajouter</button>
        </div>

        <div class="dates-row">
            <div class="input-box">
                <input type="text" placeholder="Date de début">
            </div>
            <div class="input-box">
                <input type="text" placeholder="Date de fin">
            </div>
        </div>

        <div class="input-box">
            <input type="text" placeholder="À prendre (ex: carte vitale, ordonnance...)">
        </div>

        <button class="btn-save" onclick="window.location.href='agenda.html'">Enregistrer l'événement</button>

    </div>

            <!-- BOTTOM NAVBAR -->
    <style>.bottom-nav a { text-decoration: none !important; }</style>
    <div class="bottom-nav">
        <a href="map.html" class="nav-item" id="nav-carte"><span class="material-symbols-outlined">location_on</span><span class="nav-text">Carte</span></a>
        <a href="agenda.html" class="nav-item" id="nav-agenda">
            <span class="material-symbols-outlined">calendar_today</span>
            <span class="nav-text">Agenda</span>
        </a>
        <a href="contact.html" class="nav-item" id="nav-appel">
            <span class="material-symbols-outlined">call</span>
            <span class="nav-text">Appel</span>
        </a>
        <a href="parametre.html" class="nav-item" id="nav-param">
            <span class="material-symbols-outlined">settings</span>
            <span class="nav-text">Paramètre</span>
        </a>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const p = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(p.includes('agenda') || p.includes('event_')) { 
                if(document.getElementById('nav-agenda')) document.getElementById('nav-agenda').classList.add('active'); 
            }
            else if(p.includes('contact')) { 
                if(document.getElementById('nav-appel')) document.getElementById('nav-appel').classList.add('active'); 
            }
            else if(p.includes('param')) { 
                if(document.getElementById('nav-param')) document.getElementById('nav-param').classList.add('active'); 
            }
            else { 
                if(document.getElementById('nav-carte')) document.getElementById('nav-carte').classList.add('active'); 
            }
        });

        function selectCategory(elem) {
            document.querySelectorAll('.category-pill:not(.add-custom)').forEach(el => el.classList.remove('active'));
            elem.classList.add('active');
        }

        function openCustomCategoryBox() {
            const box = document.getElementById('custom-cat-box');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
            if (box.style.display === 'block') {
                document.getElementById('custom-cat-input').focus();
            }
        }

        function addCustomCategory() {
            const val = document.getElementById('custom-cat-input').value.trim();
            if (val) {
                const container = document.getElementById('categories-container');
                const btnCustom = document.getElementById('btn-add-custom');
                
                const newCat = document.createElement('div');
                newCat.className = 'category-pill active';
                newCat.textContent = val;
                newCat.onclick = function() { selectCategory(this); };

                // Enlever le focus des autres
                document.querySelectorAll('.category-pill:not(.add-custom)').forEach(el => el.classList.remove('active'));
                
                // Insérer avant le bouton + Nouvelle
                container.insertBefore(newCat, btnCustom);
                
                // Réinitialiser et cacher
                document.getElementById('custom-cat-input').value = '';
                document.getElementById('custom-cat-box').style.display = 'none';
            }
        }

        let searchTimeout;
        async function searchAddress(val) {
            const box = document.getElementById('suggestions-box');
            if (!val || val.length < 3) { box.style.display = 'none'; return; }
            
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const [resNom, resGouv] = await Promise.all([
                        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}&limit=3&addressdetails=1&countrycodes=fr`).catch(() => null),
                        fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(val)}&limit=3`).catch(() => null)
                    ]);
                    
                    const dataNom = resNom && resNom.ok ? await resNom.json() : [];
                    const rawGouv = resGouv && resGouv.ok ? await resGouv.json() : {features:[]};
                    
                    const dataGouv = (rawGouv.features || []).map(f => {
                        return { name: f.properties.name, display_name: f.properties.context || f.properties.city };
                    });

                    let combined = [...dataGouv, ...dataNom].slice(0, 5);

                    if (combined.length > 0) {
                        box.innerHTML = '';
                        combined.forEach(item => {
                            let name = item.name || (item.address && (item.address.road || item.address.city)) || item.display_name;
                            let details = item.display_name ? item.display_name.split(',')[0] : '';
                            box.innerHTML += `
                                <div style="padding: 12px; border-bottom: 1px solid #eee; cursor: pointer;" onclick="document.getElementById('emplacement-input').value = '${name.replace(/'/g, "\\'")}'; document.getElementById('suggestions-box').style.display='none';">
                                    <span class="material-symbols-outlined" style="vertical-align: middle; margin-right: 8px; color: #640C31; font-size:20px;">location_on</span>
                                    <span style="font-family:'Rubik', sans-serif; font-size:15px; font-weight:500; vertical-align: middle; color:#000;">${name} <span style="font-size:13px;color:#777;font-weight:400;">${details}</span></span>
                                </div>
                            `;
                        });
                        box.style.display = 'block';
                    } else {
                        box.style.display = 'none';
                    }
                } catch (e) {
                    console.error(e);
                    box.style.display = 'none';
                }
            }, 600);
        }
    </script>
</body>
</html>
